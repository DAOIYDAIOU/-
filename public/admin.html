<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TRENDSETTER MARKET — Admin</title>
  <link rel="stylesheet" href="/style.css" />
</head>
<body>
  <div id="adminView" class="admin-shell hidden">
    <div class="section-head">
      <div>
        <p class="eyebrow">CONTROL CENTER</p>
        <h2>TRENDSETTER MARKET Admin</h2>
      </div>
      <div class="filters">
        <button id="reloadBtn" class="secondary-btn">Обновить</button>
      </div>
    </div>

    <div class="admin-grid">
      <section class="admin-panel">
        <p class="eyebrow">BANNER SETTINGS</p>
        <div class="admin-form">
          <select id="bannerEnabled">
            <option value="true">Баннер включен</option>
            <option value="false">Баннер выключен</option>
          </select>
          <input id="bannerText" placeholder="Текст баннера" />
          <input id="bannerSubtext" placeholder="Подтекст" />
          <input id="bannerCtaText" placeholder="Текст кнопки" />
          <button id="saveBannerBtn" class="admin-btn">Сохранить баннер</button>
        </div>

        <hr style="border-color:rgba(255,255,255,.08);margin:20px 0;" />

        <p class="eyebrow">ADD PRODUCT</p>
        <div class="admin-form">
          <input id="title" placeholder="Название товара" />
          <div class="split">
            <input id="price" type="text" inputmode="decimal" placeholder="Цена" />
            <input id="oldPrice" type="text" inputmode="decimal" placeholder="Старая цена" />
          </div>
          <div class="split">
            <input id="discount" type="text" inputmode="numeric" placeholder="Скидка %" />
            <input id="category" placeholder="Категория" />
          </div>
          <input id="image" placeholder="Ссылка на изображение или /assets/brand-avatar.png" />
          <input id="sizes" placeholder="Размеры через запятую: S,M,L,XL" />
          <input id="badge" placeholder="Бейдж: New / Хит / Limited" />
          <textarea id="description" placeholder="Описание товара"></textarea>
          <div class="split">
            <select id="inStock">
              <option value="true">В наличии</option>
              <option value="false">Нет в наличии</option>
            </select>
            <select id="featured">
              <option value="false">Обычный</option>
              <option value="true">Хит</option>
            </select>
          </div>
          <button id="addProductBtn" class="admin-btn">Добавить товар</button>
        </div>
      </section>

      <section class="admin-panel">
        <p class="eyebrow">ADMINS</p>
        <div id="adminsAdmin" class="admin-table"></div>

        <hr style="border-color:rgba(255,255,255,.08);margin:20px 0;" />

        <p class="eyebrow">PRODUCTS</p>
        <div id="productsAdmin" class="admin-table"></div>

        <hr style="border-color:rgba(255,255,255,.08);margin:20px 0;" />

        <p class="eyebrow">ORDERS</p>
        <div id="ordersAdmin" class="admin-table"></div>
      </section>
    </div>
  </div>

  <div id="deniedView" class="login-wrap hidden">
    <div class="login-card">
      <p class="eyebrow">ADMIN ACCESS</p>
      <h2>Нет доступа</h2>
      <p class="tiny">Открой админку только по кнопке из Telegram-бота после активации админа.</p>
    </div>
  </div>

  <script src="/admin.js"></script>
</body>
</html>
